name: PublishRelease - WinForms Other Variants

# PLEASE NOTE: PUBLISHING/DEPLOYMENT
#   * Release is to be created manually at GitHub releases management page
#     * release name usually contains "1.2.3.4" (also supported: "v1.2.3.4")
#   * After creating a GitHub release, following actions will automatically run:
#     * Attaching of compiled binaries to GitHub release

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write # nötig fürs Anhängen von Assets an ein Release

env:
  BUILD_CONFIGURATION: Release
  OUT_FRAMEWORK: artifacts/publish/winforms/framework/win-x64
  OUT_PORTABLE: artifacts/publish/winforms/portable/win-x64

jobs:
  winforms-other:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        shell: bash
        run: |
          #RAW_TAG="${{ github.event.release.tag_name || github.ref_name }}"
          RAW_TAG="${{ github.event.release.tag_name }}"
          if [[ -z "$RAW_TAG" ]]; then
            VER="0.0.0.${{ github.run_number }}"
          else
            VER="${RAW_TAG#v}"
          fi

          IFS='.' read -ra VERSION_PARTS <<< "$VER"
          if (( ${#VERSION_PARTS[@]} > 4 )); then
            echo "Version '$VER' has more than four parts and cannot be used for .NET manifests." >&2
            exit 1
          fi
          for part in "${VERSION_PARTS[@]}"; do
            if [[ ! "$part" =~ ^[0-9]+$ ]]; then
              echo "Version '$VER' contains a non-numeric part '$part' and cannot be used for .NET manifests." >&2
              exit 1
            fi
          done
          while (( ${#VERSION_PARTS[@]} < 4 )); do
            VERSION_PARTS+=("0")
          done
          VER="$(IFS=.; echo "${VERSION_PARTS[*]}")"

          echo "VERSION=$VER" >> "$GITHUB_ENV"
          echo "Resolved VERSION=$VER"

      - name: Resolve update channel
        shell: pwsh
        run: |
          $channel = if ("${{ github.event_name }}" -ne "release") { "test" } elseif ("${{ github.event.release.prerelease }}" -eq "true") { "dev" } else { "stable" }
          "CHANNEL=$channel" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore Tools
        run: dotnet tool restore

      - name: Resolve release tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          else
            SAFE_REF="$(printf '%s' "$GITHUB_REF_NAME" | tr '/._' '-' | tr -cd 'A-Za-z0-9-')"
            RELEASE_TAG="preview-${SAFE_REF}-${GITHUB_RUN_NUMBER}"
          fi

          if git ls-remote --heads origin "$RELEASE_TAG" | grep -q .; then
            echo "Release tag would collide with branch name: $RELEASE_TAG" >&2
            exit 1
          fi

          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "Resolved RELEASE_TAG=$RELEASE_TAG"

      - name: Restore
        run: dotnet restore GuacamoleClient-WinForms/GuacamoleClient-WinForms.csproj

      - name: Publish WinForms (framework-dependent)
        shell: pwsh
        run: |
          $out = Join-Path $env:GITHUB_WORKSPACE "${{ env.OUT_FRAMEWORK }}"
          New-Item -ItemType Directory -Force -Path $out | Out-Null

          dotnet publish .\GuacamoleClient-WinForms\GuacamoleClient-WinForms.csproj `
            -c ${{ env.BUILD_CONFIGURATION }} `
            -r win-x64 `
            --self-contained false `
            -o $out `
            -p:Version=${{ env.VERSION }} `
            -p:FileVersion=${{ env.VERSION }} `
            -p:AssemblyVersion=${{ env.VERSION }} `
            -p:InformationalVersion=${{ env.VERSION }}

          $appInfo = [ordered]@{
            schemaVersion = 1
            appId = "winforms"
            deploymentType = "framework-dependent"
            channel = $env:CHANNEL
            version = $env:VERSION
            updatesUrl = "https://jochenwezel.github.io/GuacamoleClient/app-updates.json"
          }
          $appInfo | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath (Join-Path $out "app-info.json") -Encoding utf8

      - name: Publish WinForms (portable, single exe)
        shell: pwsh
        run: |
          $out = Join-Path $env:GITHUB_WORKSPACE "${{ env.OUT_PORTABLE }}"
          New-Item -ItemType Directory -Force -Path $out | Out-Null

          dotnet publish .\GuacamoleClient-WinForms\GuacamoleClient-WinForms.csproj `
            -c ${{ env.BUILD_CONFIGURATION }} `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            -o $out `
            -p:Version=${{ env.VERSION }} `
            -p:FileVersion=${{ env.VERSION }} `
            -p:AssemblyVersion=${{ env.VERSION }} `
            -p:InformationalVersion=${{ env.VERSION }}

          $appInfo = [ordered]@{
            schemaVersion = 1
            appId = "winforms"
            deploymentType = "portable"
            channel = $env:CHANNEL
            version = $env:VERSION
            updatesUrl = "https://jochenwezel.github.io/GuacamoleClient/app-updates.json"
          }
          $appInfo | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath (Join-Path $out "app-info.json") -Encoding utf8

      - name: Pack framework-dependent
        shell: pwsh
        run: |
          $src = Join-Path $env:GITHUB_WORKSPACE "${{ env.OUT_FRAMEWORK }}\*"
          $dst = Join-Path $env:GITHUB_WORKSPACE "bin-winforms-framework-${{ env.VERSION }}.zip"
          Compress-Archive -Path $src -DestinationPath $dst -Force

      - name: Pack portable single exe
        shell: pwsh
        run: |
          $src = Join-Path $env:GITHUB_WORKSPACE "${{ env.OUT_PORTABLE }}\*"
          $dst = Join-Path $env:GITHUB_WORKSPACE "bin-winforms-portable-${{ env.VERSION }}.zip"
          Compress-Archive -Path $src -DestinationPath $dst -Force

      - name: Publish WinForms variants to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin-winforms-framework-${{ env.VERSION }}.zip
            bin-winforms-portable-${{ env.VERSION }}.zip
          tag_name: ${{ env.RELEASE_TAG }}
          prerelease: ${{ github.event_name != 'release' || github.event.release.prerelease }}
          make_latest: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
