name: PublishRelease - Avalonia

# PLEASE NOTE: PUBLISHING/DEPLOYMENT
#   * Release is to be created manually at GitHub releases management page
#     * release name usually contains "1.2.3.4" (also supported: "v1.2.3.4")
#   * After creating a GitHub release, following actions will automatically run:
#     * Attaching of compiled binaries to GitHub release

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write # nötig fürs Anhängen von Assets an ein Release

env:
  BUILD_CONFIGURATION: Release

jobs:
  avalonia:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os_id: windows
          - os: ubuntu-latest
            os_id: linux
          - os: macos-latest
            os_id: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        shell: bash
        run: |
          #RAW_TAG="${{ github.event.release.tag_name || github.ref_name }}"
          RAW_TAG="${{ github.event.release.tag_name }}"
          if [[ -z "$RAW_TAG" ]]; then
            VER="0.0.0.${{ github.run_number }}"
          else
            VER="${RAW_TAG#v}"
          fi

          IFS='.' read -ra VERSION_PARTS <<< "$VER"
          if (( ${#VERSION_PARTS[@]} > 4 )); then
            echo "Version '$VER' has more than four parts and cannot be used for .NET manifests." >&2
            exit 1
          fi
          for part in "${VERSION_PARTS[@]}"; do
            if [[ ! "$part" =~ ^[0-9]+$ ]]; then
              echo "Version '$VER' contains a non-numeric part '$part' and cannot be used for .NET manifests." >&2
              exit 1
            fi
          done
          while (( ${#VERSION_PARTS[@]} < 4 )); do
            VERSION_PARTS+=("0")
          done
          VER="$(IFS=.; echo "${VERSION_PARTS[*]}")"

          echo "VERSION=$VER" >> "$GITHUB_ENV"
          echo "OS_NAME=${{ matrix.os_id }}" >> "$GITHUB_ENV"
          echo "Resolved VERSION=$VER"

      - name: Restore Tools
        run: dotnet tool restore

      - name: Install RPM packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Resolve release tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          else
            SAFE_REF="$(printf '%s' "$GITHUB_REF_NAME" | tr '/._' '-' | tr -cd 'A-Za-z0-9-')"
            RELEASE_TAG="preview-${SAFE_REF}-${GITHUB_RUN_NUMBER}"
          fi

          if git ls-remote --heads origin "$RELEASE_TAG" | grep -q .; then
            echo "Release tag would collide with branch name: $RELEASE_TAG" >&2
            exit 1
          fi

          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "Resolved RELEASE_TAG=$RELEASE_TAG"

      - name: Resolve update channel
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "release" ]]; then
            CHANNEL="test"
          elif [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            CHANNEL="dev"
          else
            CHANNEL="stable"
          fi

          echo "CHANNEL=$CHANNEL" >> "$GITHUB_ENV"
          echo "Resolved CHANNEL=$CHANNEL"

      - name: Resolve release gates
        shell: bash
        run: |
          set -euo pipefail

          is_stable_release=false
          publish_dev_assets=false
          if [[ "${{ github.event_name }}" == "release" && "${{ github.event.release.prerelease }}" != "true" ]]; then
            is_stable_release=true
          fi
          if [[ "${{ github.event_name }}" == "release" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            publish_dev_assets=true
          fi

          stable_artifact_enabled() {
            local gate_path="$1"
            [[ "$is_stable_release" == "true" && ! -f "$gate_path" ]]
          }

          publish_linux_zip=false
          publish_linux_tarball=false
          publish_linux_rpm=false
          publish_linux_deb=false
          publish_macos_arm64_zip=false
          publish_macos_x64_zip=false

          if stable_artifact_enabled "release-gates/not-yet-stable.linux-x64.zip.disabled"; then publish_linux_zip=true; fi
          if stable_artifact_enabled "release-gates/not-yet-stable.linux-x64.tarball.disabled"; then publish_linux_tarball=true; fi
          if stable_artifact_enabled "release-gates/not-yet-stable.linux-x64.rpm.disabled"; then publish_linux_rpm=true; fi
          if stable_artifact_enabled "release-gates/not-yet-stable.linux-x64.deb.disabled"; then publish_linux_deb=true; fi
          if stable_artifact_enabled "release-gates/not-yet-stable.osx-arm64.zip.disabled"; then publish_macos_arm64_zip=true; fi
          if stable_artifact_enabled "release-gates/not-yet-stable.osx-x64.zip.disabled"; then publish_macos_x64_zip=true; fi

          {
            echo "IS_STABLE_RELEASE=$is_stable_release"
            echo "PUBLISH_DEV_ASSETS=$publish_dev_assets"
            echo "PUBLISH_LINUX_ZIP=$publish_linux_zip"
            echo "PUBLISH_LINUX_TARBALL=$publish_linux_tarball"
            echo "PUBLISH_LINUX_RPM=$publish_linux_rpm"
            echo "PUBLISH_LINUX_DEB=$publish_linux_deb"
            echo "PUBLISH_MACOS_ARM64_ZIP=$publish_macos_arm64_zip"
            echo "PUBLISH_MACOS_X64_ZIP=$publish_macos_x64_zip"
          } >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore GuacamoleClient-Avalonia/GuacamoleClient-Avalonia.csproj

      - name: Build Avalonia (Windows/Linux)
        if: runner.os != 'macOS'
        run: >
          dotnet build GuacamoleClient-Avalonia/GuacamoleClient-Avalonia.csproj
          --configuration ${{ env.BUILD_CONFIGURATION }}
          --no-restore
          -p:Version=${{ env.VERSION }}
          -p:FileVersion=${{ env.VERSION }}
          -p:AssemblyVersion=${{ env.VERSION }}
          -p:InformationalVersion=${{ env.VERSION }}

      - name: Publish Avalonia (Linux x64)
        if: runner.os == 'Linux'
        run: >
          dotnet publish GuacamoleClient-Avalonia/GuacamoleClient-Avalonia.csproj
          -c ${{ env.BUILD_CONFIGURATION }}
          -r linux-x64
          --self-contained true
          /p:PublishSingleFile=false
          /p:IncludeNativeLibrariesForSelfExtract=false
          -p:Version=${{ env.VERSION }}
          -p:FileVersion=${{ env.VERSION }}
          -p:AssemblyVersion=${{ env.VERSION }}
          -p:InformationalVersion=${{ env.VERSION }}

      - name: Write app-info.json for Avalonia (Windows/Linux)
        if: runner.os != 'macOS'
        shell: pwsh
        run: |
          $appInfo = [ordered]@{
            schemaVersion = 1
            appId = "avalonia"
            deploymentType = "zip"
            channel = $env:CHANNEL
            version = $env:VERSION
            updatesUrl = "https://jochenwezel.github.io/GuacamoleClient/app-updates.json"
          }
          $out = Join-Path $env:GITHUB_WORKSPACE "GuacamoleClient-Avalonia\bin\${{ env.BUILD_CONFIGURATION }}\net8.0"
          $appInfo | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath (Join-Path $out "app-info.json") -Encoding utf8
          if ("${{ runner.os }}" -eq "Linux") {
            $publishOut = Join-Path $env:GITHUB_WORKSPACE "GuacamoleClient-Avalonia/bin/${{ env.BUILD_CONFIGURATION }}/net8.0/linux-x64/publish"
            $appInfo | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath (Join-Path $publishOut "app-info.json") -Encoding utf8
          }

      - name: Publish Avalonia (macOS ARM64)
        if: runner.os == 'macOS'
        run: >
          dotnet publish GuacamoleClient-Avalonia/GuacamoleClient-Avalonia.csproj
          -c ${{ env.BUILD_CONFIGURATION }}
          -r osx-arm64
          --self-contained false
          /p:PublishSingleFile=false
          /p:IncludeNativeLibrariesForSelfExtract=false
          -p:Version=${{ env.VERSION }}
          -p:FileVersion=${{ env.VERSION }}
          -p:AssemblyVersion=${{ env.VERSION }}
          -p:InformationalVersion=${{ env.VERSION }}

      - name: Clean Avalonia before macOS Intel x64 publish
        if: runner.os == 'macOS'
        run: dotnet clean GuacamoleClient-Avalonia/GuacamoleClient-Avalonia.csproj -c ${{ env.BUILD_CONFIGURATION }}

      - name: Publish Avalonia (macOS Intel x64)
        if: runner.os == 'macOS'
        run: >
          dotnet publish GuacamoleClient-Avalonia/GuacamoleClient-Avalonia.csproj
          -c ${{ env.BUILD_CONFIGURATION }}
          -r osx-x64
          --self-contained false
          /p:PublishSingleFile=false
          /p:IncludeNativeLibrariesForSelfExtract=false
          -p:Version=${{ env.VERSION }}
          -p:FileVersion=${{ env.VERSION }}
          -p:AssemblyVersion=${{ env.VERSION }}
          -p:InformationalVersion=${{ env.VERSION }}

      - name: Write app-info.json for Avalonia (macOS)
        if: runner.os == 'macOS'
        shell: pwsh
        run: |
          foreach ($rid in @("osx-arm64", "osx-x64")) {
            $appInfo = [ordered]@{
              schemaVersion = 1
              appId = "avalonia"
              deploymentType = "zip"
              channel = $env:CHANNEL
              version = $env:VERSION
              updatesUrl = "https://jochenwezel.github.io/GuacamoleClient/app-updates.json"
            }
            $out = Join-Path $env:GITHUB_WORKSPACE "GuacamoleClient-Avalonia/bin/${{ env.BUILD_CONFIGURATION }}/net8.0/$rid/publish"
            $appInfo | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath (Join-Path $out "app-info.json") -Encoding utf8
          }

      - name: Pack binaries - Avalonia (Windows)
        if: runner.os == 'Windows' && env.IS_STABLE_RELEASE == 'true'
        shell: pwsh
        run: |
          $src = Join-Path $env:GITHUB_WORKSPACE "GuacamoleClient-Avalonia\bin\${{ env.BUILD_CONFIGURATION }}\net8.0\*"
          $dst = Join-Path $env:GITHUB_WORKSPACE "bin-avalonia-${{ env.OS_NAME }}-${{ env.VERSION }}.zip"
          Compress-Archive -Path $src -DestinationPath $dst -Force

      - name: Pack dev binaries - Avalonia (Windows)
        if: runner.os == 'Windows' && env.PUBLISH_DEV_ASSETS == 'true'
        shell: pwsh
        run: |
          $srcRoot = Join-Path $env:GITHUB_WORKSPACE "GuacamoleClient-Avalonia\bin\${{ env.BUILD_CONFIGURATION }}\net8.0"
          $devRoot = Join-Path $env:GITHUB_WORKSPACE "dev-avalonia-windows"
          if (Test-Path $devRoot) { Remove-Item -Recurse -Force $devRoot }
          New-Item -ItemType Directory -Force -Path $devRoot | Out-Null
          Copy-Item -Path (Join-Path $srcRoot "*") -Destination $devRoot -Recurse -Force
          $appInfo = [ordered]@{
            schemaVersion = 1
            appId = "avalonia"
            deploymentType = "zip"
            channel = "dev"
            version = $env:VERSION
            updatesUrl = "https://jochenwezel.github.io/GuacamoleClient/app-updates.json"
          }
          $appInfo | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath (Join-Path $devRoot "app-info.json") -Encoding utf8
          Compress-Archive -Path (Join-Path $devRoot "*") -DestinationPath (Join-Path $env:GITHUB_WORKSPACE "bin-avalonia-windows-dev-${{ env.VERSION }}.zip") -Force

      - name: Pack binaries - Avalonia (Linux)
        if: runner.os == 'Linux' && env.PUBLISH_LINUX_ZIP == 'true'
        shell: bash
        run: |
          (cd "GuacamoleClient-Avalonia/bin/${{ env.BUILD_CONFIGURATION }}/net8.0/linux-x64/publish" && \
           zip "$GITHUB_WORKSPACE/bin-avalonia-${{ env.OS_NAME }}-${{ env.VERSION }}.zip" -r .)

      - name: Pack dev binaries - Avalonia (Linux)
        if: runner.os == 'Linux' && env.PUBLISH_DEV_ASSETS == 'true'
        shell: bash
        run: |
          set -euo pipefail
          src_root="$GITHUB_WORKSPACE/GuacamoleClient-Avalonia/bin/${BUILD_CONFIGURATION}/net8.0/linux-x64/publish"
          dev_root="$GITHUB_WORKSPACE/dev-avalonia-linux-x64"
          rm -rf "$dev_root"
          mkdir -p "$dev_root"
          cp -a "$src_root/." "$dev_root/"
          cat > "$dev_root/app-info.json" <<EOF
          {
            "schemaVersion": 1,
            "appId": "avalonia",
            "deploymentType": "zip",
            "channel": "dev",
            "version": "${VERSION}",
            "updatesUrl": "https://jochenwezel.github.io/GuacamoleClient/app-updates.json"
          }
          EOF
          (cd "$dev_root" && zip "$GITHUB_WORKSPACE/bin-avalonia-linux-dev-${VERSION}.zip" -r .)

      - name: Pack tarball - Avalonia (Linux x64)
        if: runner.os == 'Linux' && env.PUBLISH_LINUX_TARBALL == 'true'
        shell: bash
        run: |
          set -euo pipefail
          package_root="$GITHUB_WORKSPACE/guacamoleclient-avalonia-linux-x64-${VERSION}"
          publish_dir="$GITHUB_WORKSPACE/GuacamoleClient-Avalonia/bin/${BUILD_CONFIGURATION}/net8.0/linux-x64/publish"

          rm -rf "$package_root"
          mkdir -p "$package_root"
          cp -a "$publish_dir/." "$package_root/"

          cat > "$package_root/app-info.json" <<EOF
          {
            "schemaVersion": 1,
            "appId": "avalonia",
            "deploymentType": "linux-tarball-direct",
            "channel": "${CHANNEL}",
            "version": "${VERSION}",
            "updatesUrl": "https://jochenwezel.github.io/GuacamoleClient/app-updates.json"
          }
          EOF

          cat > "$package_root/guacamoleclient" <<'EOF'
          #!/usr/bin/env sh
          cd "$(dirname "$0")" || exit 1
          exec ./GuacamoleClient-Avalonia "$@"
          EOF
          chmod 0755 "$package_root/guacamoleclient"
          chmod 0755 "$package_root/GuacamoleClient-Avalonia"

          tar -C "$GITHUB_WORKSPACE" -czf "$GITHUB_WORKSPACE/guacamoleclient-avalonia-linux-x64-${VERSION}.tar.gz" "guacamoleclient-avalonia-linux-x64-${VERSION}"

      - name: Pack dev tarball - Avalonia (Linux x64)
        if: runner.os == 'Linux' && env.PUBLISH_DEV_ASSETS == 'true'
        shell: bash
        run: |
          set -euo pipefail
          package_root="$GITHUB_WORKSPACE/guacamoleclient-avalonia-linux-x64-dev-${VERSION}"
          publish_dir="$GITHUB_WORKSPACE/GuacamoleClient-Avalonia/bin/${BUILD_CONFIGURATION}/net8.0/linux-x64/publish"

          rm -rf "$package_root"
          mkdir -p "$package_root"
          cp -a "$publish_dir/." "$package_root/"

          cat > "$package_root/app-info.json" <<EOF
          {
            "schemaVersion": 1,
            "appId": "avalonia",
            "deploymentType": "linux-tarball-direct",
            "channel": "dev",
            "version": "${VERSION}",
            "updatesUrl": "https://jochenwezel.github.io/GuacamoleClient/app-updates.json"
          }
          EOF

          cat > "$package_root/guacamoleclient" <<'EOF'
          #!/usr/bin/env sh
          cd "$(dirname "$0")" || exit 1
          exec ./GuacamoleClient-Avalonia "$@"
          EOF
          chmod 0755 "$package_root/guacamoleclient"
          chmod 0755 "$package_root/GuacamoleClient-Avalonia"

          tar -C "$GITHUB_WORKSPACE" -czf "$GITHUB_WORKSPACE/guacamoleclient-avalonia-linux-x64-dev-${VERSION}.tar.gz" "guacamoleclient-avalonia-linux-x64-dev-${VERSION}"

      - name: Pack RPM package - Avalonia (Linux x64)
        if: runner.os == 'Linux' && env.PUBLISH_LINUX_RPM == 'true'
        shell: bash
        run: |
          set -euo pipefail

          package_name="guacamoleclient-avalonia"
          package_version="${VERSION}"
          package_release="1"
          rpm_root="$GITHUB_WORKSPACE/rpmbuild"
          package_root="$GITHUB_WORKSPACE/rpm-${package_name}-${package_version}-linux-x64"
          publish_dir="$GITHUB_WORKSPACE/GuacamoleClient-Avalonia/bin/${BUILD_CONFIGURATION}/net8.0/linux-x64/publish"
          install_dir="$package_root/opt/guacamoleclient"

          rm -rf "$rpm_root" "$package_root"
          mkdir -p "$rpm_root/BUILD" "$rpm_root/RPMS" "$rpm_root/SOURCES" "$rpm_root/SPECS" "$rpm_root/SRPMS"
          mkdir -p "$install_dir" "$package_root/usr/bin" "$package_root/usr/share/applications" "$package_root/usr/share/icons/hicolor/256x256/apps"
          cp -a "$publish_dir/." "$install_dir/"

          cat > "$install_dir/app-info.json" <<EOF
          {
            "schemaVersion": 1,
            "appId": "avalonia",
            "deploymentType": "linux-rpm-direct",
            "channel": "${CHANNEL}",
            "version": "${VERSION}",
            "updatesUrl": "https://jochenwezel.github.io/GuacamoleClient/app-updates.json"
          }
          EOF

          cat > "$package_root/usr/bin/guacamoleclient" <<'EOF'
          #!/usr/bin/env sh
          cd /opt/guacamoleclient || exit 1
          exec /opt/guacamoleclient/GuacamoleClient-Avalonia "$@"
          EOF
          chmod 0755 "$package_root/usr/bin/guacamoleclient"
          chmod 0755 "$install_dir/GuacamoleClient-Avalonia"

          cp "$GITHUB_WORKSPACE/logos/favicon-guac-classic-logo/web-app-manifest-512x512.png" "$package_root/usr/share/icons/hicolor/256x256/apps/guacamoleclient.png"

          cat > "$package_root/usr/share/applications/guacamoleclient.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=GuacamoleClient
          Comment=Desktop client for Apache Guacamole remote sessions
          Exec=guacamoleclient
          Icon=guacamoleclient
          Terminal=false
          StartupNotify=true
          StartupWMClass=GuacamoleClient-Avalonia
          Categories=Network;RemoteAccess;
          EOF

          spec_file="$rpm_root/SPECS/${package_name}.spec"
          cat > "$spec_file" <<EOF
          Name:           ${package_name}
          Version:        ${package_version}
          Release:        ${package_release}%{?dist}
          Summary:        Desktop client for Apache Guacamole
          License:        Apache-2.0
          URL:            https://github.com/jochenwezel/GuacamoleClient
          BuildArch:      x86_64
          Requires:       glibc, cups-libs, alsa-lib, at-spi2-atk, atk, libdrm, fontconfig, mesa-libgbm, libgcc, mesa-libGL, gtk3, nss, libstdc++, libX11-xcb, libxcb, libXcomposite, libXcursor, libXdamage, libXi, libxkbcommon, libXrandr, libXrender, libXScrnSaver, libXtst, zlib
          %global debug_package %{nil}

          %description
          GuacamoleClient runs Apache Guacamole sessions in a dedicated desktop application window.

          %prep

          %build

          %install
          mkdir -p "%{buildroot}"
          cp -a "${package_root}/." "%{buildroot}/"

          %files
          /opt/guacamoleclient
          /usr/bin/guacamoleclient
          /usr/share/applications/guacamoleclient.desktop
          /usr/share/icons/hicolor/256x256/apps/guacamoleclient.png
          EOF

          rpmbuild --define "_topdir $rpm_root" -bb "$spec_file"
          cp "$rpm_root/RPMS/x86_64/${package_name}-${package_version}-${package_release}.x86_64.rpm" "$GITHUB_WORKSPACE/${package_name}-linux-x64-${package_version}-${package_release}.x86_64.rpm"

      - name: Pack Debian package - Avalonia (Linux x64)
        if: runner.os == 'Linux' && env.PUBLISH_LINUX_DEB == 'true'
        shell: bash
        run: |
          set -euo pipefail

          package_name="guacamoleclient-avalonia"
          package_version="${VERSION}"
          package_root="$GITHUB_WORKSPACE/pkg-${package_name}-${package_version}-linux-x64"
          publish_dir="$GITHUB_WORKSPACE/GuacamoleClient-Avalonia/bin/${BUILD_CONFIGURATION}/net8.0/linux-x64/publish"
          install_dir="$package_root/opt/guacamoleclient"

          rm -rf "$package_root"
          mkdir -p "$install_dir" "$package_root/DEBIAN" "$package_root/usr/bin" "$package_root/usr/share/applications" "$package_root/usr/share/icons/hicolor/256x256/apps"
          cp -a "$publish_dir/." "$install_dir/"

          cat > "$install_dir/app-info.json" <<EOF
          {
            "schemaVersion": 1,
            "appId": "avalonia",
            "deploymentType": "linux-deb-direct",
            "channel": "${CHANNEL}",
            "version": "${VERSION}",
            "updatesUrl": "https://jochenwezel.github.io/GuacamoleClient/app-updates.json"
          }
          EOF

          cat > "$package_root/usr/bin/guacamoleclient" <<'EOF'
          #!/usr/bin/env sh
          cd /opt/guacamoleclient || exit 1
          exec /opt/guacamoleclient/GuacamoleClient-Avalonia "$@"
          EOF
          chmod 0755 "$package_root/usr/bin/guacamoleclient"
          chmod 0755 "$install_dir/GuacamoleClient-Avalonia"

          cp "$GITHUB_WORKSPACE/logos/favicon-guac-classic-logo/web-app-manifest-512x512.png" "$package_root/usr/share/icons/hicolor/256x256/apps/guacamoleclient.png"

          cat > "$package_root/usr/share/applications/guacamoleclient.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=GuacamoleClient
          Comment=Desktop client for Apache Guacamole remote sessions
          Exec=guacamoleclient
          Icon=guacamoleclient
          Terminal=false
          StartupNotify=true
          StartupWMClass=GuacamoleClient-Avalonia
          Categories=Network;RemoteAccess;
          EOF

          installed_size="$(du -sk "$package_root" | cut -f1)"
          cat > "$package_root/DEBIAN/control" <<EOF
          Package: $package_name
          Version: $package_version
          Section: net
          Priority: optional
          Architecture: amd64
          Maintainer: CompuMaster GmbH <info@compumaster.de>
          Installed-Size: $installed_size
          Depends: libc6, libcups2, libasound2 | libasound2t64, libatk-bridge2.0-0, libatk1.0-0, libdrm2, libfontconfig1, libgbm1, libgcc-s1, libgl1, libgtk-3-0, libnss3, libstdc++6, libwpewebkit-2.0-1, libx11-xcb1, libxcb1, libxcomposite1, libxcursor1, libxdamage1, libxi6, libxkbcommon0, libxrandr2, libxrender1, libxss1, libxtst6, zlib1g
          Homepage: https://github.com/jochenwezel/GuacamoleClient
          Description: Desktop client for Apache Guacamole
           GuacamoleClient runs Apache Guacamole sessions in a dedicated desktop application window.
          EOF

          dpkg-deb --build "$package_root" "$GITHUB_WORKSPACE/${package_name}-linux-x64_${package_version}_amd64.deb"

      - name: Pack dev Debian package - Avalonia (Linux x64)
        if: runner.os == 'Linux' && env.PUBLISH_DEV_ASSETS == 'true'
        shell: bash
        run: |
          set -euo pipefail

          package_name="guacamoleclient-avalonia"
          package_version="${VERSION}"
          package_root="$GITHUB_WORKSPACE/pkg-${package_name}-${package_version}-linux-x64-dev"
          publish_dir="$GITHUB_WORKSPACE/GuacamoleClient-Avalonia/bin/${BUILD_CONFIGURATION}/net8.0/linux-x64/publish"
          install_dir="$package_root/opt/guacamoleclient"

          rm -rf "$package_root"
          mkdir -p "$install_dir" "$package_root/DEBIAN" "$package_root/usr/bin" "$package_root/usr/share/applications" "$package_root/usr/share/icons/hicolor/256x256/apps"
          cp -a "$publish_dir/." "$install_dir/"

          cat > "$install_dir/app-info.json" <<EOF
          {
            "schemaVersion": 1,
            "appId": "avalonia",
            "deploymentType": "linux-deb-direct",
            "channel": "dev",
            "version": "${VERSION}",
            "updatesUrl": "https://jochenwezel.github.io/GuacamoleClient/app-updates.json"
          }
          EOF

          cat > "$package_root/usr/bin/guacamoleclient" <<'EOF'
          #!/usr/bin/env sh
          cd /opt/guacamoleclient || exit 1
          exec /opt/guacamoleclient/GuacamoleClient-Avalonia "$@"
          EOF
          chmod 0755 "$package_root/usr/bin/guacamoleclient"
          chmod 0755 "$install_dir/GuacamoleClient-Avalonia"

          cp "$GITHUB_WORKSPACE/logos/favicon-guac-classic-logo/web-app-manifest-512x512.png" "$package_root/usr/share/icons/hicolor/256x256/apps/guacamoleclient.png"

          cat > "$package_root/usr/share/applications/guacamoleclient.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=GuacamoleClient
          Comment=Desktop client for Apache Guacamole remote sessions
          Exec=guacamoleclient
          Icon=guacamoleclient
          Terminal=false
          StartupNotify=true
          StartupWMClass=GuacamoleClient-Avalonia
          Categories=Network;RemoteAccess;
          EOF

          installed_size="$(du -sk "$package_root" | cut -f1)"
          cat > "$package_root/DEBIAN/control" <<EOF
          Package: $package_name
          Version: $package_version
          Section: net
          Priority: optional
          Architecture: amd64
          Maintainer: CompuMaster GmbH <info@compumaster.de>
          Installed-Size: $installed_size
          Depends: libc6, libcups2, libasound2 | libasound2t64, libatk-bridge2.0-0, libatk1.0-0, libdrm2, libfontconfig1, libgbm1, libgcc-s1, libgl1, libgtk-3-0, libnss3, libstdc++6, libwpewebkit-2.0-1, libx11-xcb1, libxcb1, libxcomposite1, libxcursor1, libxdamage1, libxi6, libxkbcommon0, libxrandr2, libxrender1, libxss1, libxtst6, zlib1g
          Homepage: https://github.com/jochenwezel/GuacamoleClient
          Description: Desktop client for Apache Guacamole
           GuacamoleClient runs Apache Guacamole sessions in a dedicated desktop application window.
          EOF

          dpkg-deb --build "$package_root" "$GITHUB_WORKSPACE/${package_name}-linux-x64-dev_${package_version}_amd64.deb"

      - name: Pack dev RPM package - Avalonia (Linux x64)
        if: runner.os == 'Linux' && env.PUBLISH_DEV_ASSETS == 'true'
        shell: bash
        run: |
          set -euo pipefail

          package_name="guacamoleclient-avalonia"
          package_version="${VERSION}"
          package_release="1"
          rpm_root="$GITHUB_WORKSPACE/rpmbuild-dev"
          package_root="$GITHUB_WORKSPACE/rpm-${package_name}-${package_version}-linux-x64-dev"
          publish_dir="$GITHUB_WORKSPACE/GuacamoleClient-Avalonia/bin/${BUILD_CONFIGURATION}/net8.0/linux-x64/publish"
          install_dir="$package_root/opt/guacamoleclient"

          rm -rf "$rpm_root" "$package_root"
          mkdir -p "$rpm_root/BUILD" "$rpm_root/RPMS" "$rpm_root/SOURCES" "$rpm_root/SPECS" "$rpm_root/SRPMS"
          mkdir -p "$install_dir" "$package_root/usr/bin" "$package_root/usr/share/applications" "$package_root/usr/share/icons/hicolor/256x256/apps"
          cp -a "$publish_dir/." "$install_dir/"

          cat > "$install_dir/app-info.json" <<EOF
          {
            "schemaVersion": 1,
            "appId": "avalonia",
            "deploymentType": "linux-rpm-direct",
            "channel": "dev",
            "version": "${VERSION}",
            "updatesUrl": "https://jochenwezel.github.io/GuacamoleClient/app-updates.json"
          }
          EOF

          cat > "$package_root/usr/bin/guacamoleclient" <<'EOF'
          #!/usr/bin/env sh
          cd /opt/guacamoleclient || exit 1
          exec /opt/guacamoleclient/GuacamoleClient-Avalonia "$@"
          EOF
          chmod 0755 "$package_root/usr/bin/guacamoleclient"
          chmod 0755 "$install_dir/GuacamoleClient-Avalonia"

          cp "$GITHUB_WORKSPACE/logos/favicon-guac-classic-logo/web-app-manifest-512x512.png" "$package_root/usr/share/icons/hicolor/256x256/apps/guacamoleclient.png"

          cat > "$package_root/usr/share/applications/guacamoleclient.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=GuacamoleClient
          Comment=Desktop client for Apache Guacamole remote sessions
          Exec=guacamoleclient
          Icon=guacamoleclient
          Terminal=false
          StartupNotify=true
          StartupWMClass=GuacamoleClient-Avalonia
          Categories=Network;RemoteAccess;
          EOF

          spec_file="$rpm_root/SPECS/${package_name}.spec"
          cat > "$spec_file" <<EOF
          Name:           ${package_name}
          Version:        ${package_version}
          Release:        ${package_release}%{?dist}
          Summary:        Desktop client for Apache Guacamole
          License:        Apache-2.0
          URL:            https://github.com/jochenwezel/GuacamoleClient
          BuildArch:      x86_64
          Requires:       glibc, cups-libs, alsa-lib, at-spi2-atk, atk, libdrm, fontconfig, mesa-libgbm, libgcc, mesa-libGL, gtk3, nss, libstdc++, libX11-xcb, libxcb, libXcomposite, libXcursor, libXdamage, libXi, libxkbcommon, libXrandr, libXrender, libXScrnSaver, libXtst, zlib
          %global debug_package %{nil}

          %description
          GuacamoleClient runs Apache Guacamole sessions in a dedicated desktop application window.

          %prep

          %build

          %install
          mkdir -p "%{buildroot}"
          cp -a "${package_root}/." "%{buildroot}/"

          %files
          /opt/guacamoleclient
          /usr/bin/guacamoleclient
          /usr/share/applications/guacamoleclient.desktop
          /usr/share/icons/hicolor/256x256/apps/guacamoleclient.png
          EOF

          rpmbuild --define "_topdir $rpm_root" -bb "$spec_file"
          cp "$rpm_root/RPMS/x86_64/${package_name}-${package_version}-${package_release}.x86_64.rpm" "$GITHUB_WORKSPACE/${package_name}-linux-x64-dev-${package_version}-${package_release}.x86_64.rpm"

      - name: Pack binaries - Avalonia - macOS ARM64
        if: runner.os == 'macOS' && env.PUBLISH_MACOS_ARM64_ZIP == 'true'
        shell: bash
        run: |
          (cd "GuacamoleClient-Avalonia/bin/${{ env.BUILD_CONFIGURATION }}/net8.0/osx-arm64/publish" && \
           zip "$GITHUB_WORKSPACE/bin-avalonia-osx-arm64-${{ env.VERSION }}.zip" -r .)

      - name: Pack binaries - Avalonia - macOS Intel x64
        if: runner.os == 'macOS' && env.PUBLISH_MACOS_X64_ZIP == 'true'
        shell: bash
        run: |
          (cd "GuacamoleClient-Avalonia/bin/${{ env.BUILD_CONFIGURATION }}/net8.0/osx-x64/publish" && \
           zip "$GITHUB_WORKSPACE/bin-avalonia-osx-x64-${{ env.VERSION }}.zip" -r .)

      - name: Pack dev binaries - Avalonia - macOS
        if: runner.os == 'macOS' && env.PUBLISH_DEV_ASSETS == 'true'
        shell: bash
        run: |
          set -euo pipefail
          for rid in osx-arm64 osx-x64; do
            src_root="$GITHUB_WORKSPACE/GuacamoleClient-Avalonia/bin/${BUILD_CONFIGURATION}/net8.0/$rid/publish"
            dev_root="$GITHUB_WORKSPACE/dev-avalonia-$rid"
            rm -rf "$dev_root"
            mkdir -p "$dev_root"
            cp -a "$src_root/." "$dev_root/"
            cat > "$dev_root/app-info.json" <<EOF
          {
            "schemaVersion": 1,
            "appId": "avalonia",
            "deploymentType": "zip",
            "channel": "dev",
            "version": "${VERSION}",
            "updatesUrl": "https://jochenwezel.github.io/GuacamoleClient/app-updates.json"
          }
          EOF
            (cd "$dev_root" && zip "$GITHUB_WORKSPACE/bin-avalonia-${rid}-dev-${VERSION}.zip" -r .)
          done

      - name: Publish binaries to the release (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin-avalonia-windows*.zip
          tag_name: ${{ env.RELEASE_TAG }}
          prerelease: ${{ github.event_name != 'release' || github.event.release.prerelease }}
          make_latest: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish binaries to the release (Linux)
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin-avalonia-linux*.zip
            guacamoleclient-avalonia-linux-x64*.tar.gz
            guacamoleclient-avalonia-linux-x64*.x86_64.rpm
            guacamoleclient-avalonia-linux-x64*_amd64.deb
          tag_name: ${{ env.RELEASE_TAG }}
          prerelease: ${{ github.event_name != 'release' || github.event.release.prerelease }}
          make_latest: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish binaries to the release (macOS)
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin-avalonia-osx-*.zip
          tag_name: ${{ env.RELEASE_TAG }}
          prerelease: ${{ github.event_name != 'release' || github.event.release.prerelease }}
          make_latest: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
