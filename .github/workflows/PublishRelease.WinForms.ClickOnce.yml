
name: PublishRelease - WinForms ClickOnce

# PLEASE NOTE: PUBLISHING/DEPLOYMENT
#   * Release is to be created manually at GitHub releases management page
#     * release tag usually contains "1.2.3.4" (also supported: "v1.2.3.4")
#   * After creating a GitHub release, following actions will automatically run:
#     * Creating ClickOnce manifests
#     * Publishing ClickOnce files to GitHub Pages (Auto-Update URL)

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  #contents: write # needed for attaching assets to a release
  contents: read

env:
  BUILD_CONFIGURATION: Release
  CLICKONCE_OUTDIR: artifacts/clickonce/anycpu
  CLICKONCE_DEV_OUTDIR: artifacts/clickonce-dev/anycpu
  CLICKONCE_APP_NAME: GuacamoleClient

jobs:
  winforms-clickonce:
    runs-on: windows-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      pages_subdir: ${{ steps.pages.outputs.pages_subdir }}
      provider_url: ${{ steps.pages.outputs.provider_url }}
      channel: ${{ steps.pages.outputs.channel }}
      prerelease: ${{ steps.pages.outputs.prerelease }}
      publish_both_channels: ${{ steps.pages.outputs.publish_both_channels }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.101

      - name: Resolve version
        id: version
        shell: bash
        run: |
          RAW_TAG="${{ github.event.release.tag_name }}"
          if [[ -z "$RAW_TAG" ]]; then
            VER="0.0.0.${{ github.run_number }}"
          else
            VER="${RAW_TAG#v}"
          fi

          IFS='.' read -ra VERSION_PARTS <<< "$VER"
          if (( ${#VERSION_PARTS[@]} > 4 )); then
            echo "Version '$VER' has more than four parts and cannot be used for .NET/ClickOnce manifests." >&2
            exit 1
          fi
          for part in "${VERSION_PARTS[@]}"; do
            if [[ ! "$part" =~ ^[0-9]+$ ]]; then
              echo "Version '$VER' contains a non-numeric part '$part' and cannot be used for .NET/ClickOnce manifests." >&2
              exit 1
            fi
          done
          while (( ${#VERSION_PARTS[@]} < 4 )); do
            VERSION_PARTS+=("0")
          done
          VER="$(IFS=.; echo "${VERSION_PARTS[*]}")"

          echo "VERSION=$VER" >> "$GITHUB_ENV"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Resolved VERSION=$VER"

      - name: Resolve GitHub Pages ProviderURL
        id: pages
        shell: bash
        run: |
          # Project Pages base URL for this repo:
          # https://jochenwezel.github.io/GuacamoleClient/
          if [[ "${{ github.event_name }}" == "release" && "${{ github.event.release.prerelease }}" != "true" ]]; then
            PROVIDER_URL="https://jochenwezel.github.io/GuacamoleClient/clickonce/stable/${{ env.CLICKONCE_APP_NAME }}.application"
            SUBDIR="clickonce/stable"
            CHANNEL="stable"
            MANIFEST_NAME="GuacamoleClient"
            PRERELEASE="false"
            PUBLISH_BOTH_CHANNELS="true"
          elif [[ "${{ github.event_name }}" == "release" && "${{ github.event.release.prerelease }}" == "true" ]]; then
            PROVIDER_URL="https://jochenwezel.github.io/GuacamoleClient/clickonce/dev/${{ env.CLICKONCE_APP_NAME }}.application"
            SUBDIR="clickonce/dev"
            CHANNEL="dev"
            MANIFEST_NAME="GuacamoleClient Dev"
            PRERELEASE="true"
            PUBLISH_BOTH_CHANNELS="false"
          else
            PROVIDER_URL="https://jochenwezel.github.io/GuacamoleClient/clickonce/test/${{ env.CLICKONCE_APP_NAME }}.application"
            SUBDIR="clickonce/test"
            CHANNEL="test"
            MANIFEST_NAME="GuacamoleClient Test"
            PRERELEASE="false"
            PUBLISH_BOTH_CHANNELS="false"
          fi

          echo "CLICKONCE_PROVIDER_URL=$PROVIDER_URL" >> "$GITHUB_ENV"
          echo "PAGES_SUBDIR=$SUBDIR" >> "$GITHUB_ENV"
          echo "CLICKONCE_CHANNEL=$CHANNEL" >> "$GITHUB_ENV"
          echo "CLICKONCE_MANIFEST_NAME=$MANIFEST_NAME" >> "$GITHUB_ENV"
          echo "CLICKONCE_PRERELEASE=$PRERELEASE" >> "$GITHUB_ENV"
          echo "CLICKONCE_PUBLISH_BOTH_CHANNELS=$PUBLISH_BOTH_CHANNELS" >> "$GITHUB_ENV"

          echo "provider_url=$PROVIDER_URL" >> "$GITHUB_OUTPUT"
          echo "pages_subdir=$SUBDIR" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "publish_both_channels=$PUBLISH_BOTH_CHANNELS" >> "$GITHUB_OUTPUT"

          echo "Resolved CLICKONCE_PROVIDER_URL=$PROVIDER_URL"
          echo "Resolved PAGES_SUBDIR=$SUBDIR"
          echo "Resolved CLICKONCE_MANIFEST_NAME=$MANIFEST_NAME"

      - name: Restore Tools
        run: dotnet tool restore

      - name: Info Tools
        run: |
          dotnet tool list
          dotnet tool list -g
          dotnet --list-sdks
          dotnet --list-runtimes

      - name: Restore
        run: dotnet restore GuacamoleClient-WinForms/GuacamoleClient-WinForms.csproj

      - name: Clean ClickOnce output directory
        shell: pwsh
        run: |
          $out = Join-Path $env:GITHUB_WORKSPACE "${{ env.CLICKONCE_OUTDIR }}"
          if (Test-Path $out) { Remove-Item -Recurse -Force $out }
          New-Item -ItemType Directory -Force -Path $out | Out-Null

      - name: Publish app payload (RID-less, framework-dependent)
        shell: pwsh
        run: |
          $out = Join-Path $env:GITHUB_WORKSPACE "${{ env.CLICKONCE_OUTDIR }}"
          $appSubdir = "${{ env.CLICKONCE_APP_NAME }}_$($env:VERSION.Replace('.', '_'))"
          $appOut = Join-Path $out "Application Files\$appSubdir"
          New-Item -ItemType Directory -Force -Path $appOut | Out-Null

          dotnet publish .\GuacamoleClient-WinForms\GuacamoleClient-WinForms.csproj `
            -c $env:BUILD_CONFIGURATION `
            --self-contained false `
            -o $appOut `
            -p:Version=${{ env.VERSION }} `
            -p:FileVersion=${{ env.VERSION }} `
            -p:AssemblyVersion=${{ env.VERSION }} `
            -p:InformationalVersion=${{ env.VERSION }}

          $appInfo = [ordered]@{
            schemaVersion = 1
            appId = "winforms"
            deploymentType = "clickonce"
            channel = $env:CLICKONCE_CHANNEL
            version = $env:VERSION
            updatesUrl = "https://jochenwezel.github.io/GuacamoleClient/app-updates.json"
          }
          $appInfo | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath (Join-Path $appOut "app-info.json") -Encoding utf8

          "CLICKONCE_APP_SUBDIR=Application Files\$appSubdir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Detect main EXE
        shell: pwsh
        run: |
          $out = Join-Path $env:GITHUB_WORKSPACE "${{ env.CLICKONCE_OUTDIR }}"
          $appOut = Join-Path $out $env:CLICKONCE_APP_SUBDIR

          $exe = Get-ChildItem -Path $appOut -File -Filter *.exe |
            Where-Object { $_.Name -notmatch '(?i)vshost|apphost|createdump|dotnet|host|test' } |
            Sort-Object Length -Descending |
            Select-Object -First 1

          if (-not $exe) { throw "No suitable .exe found in $appOut" }

          "CLICKONCE_EXE_NAME=$($exe.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Detected EXE: $($exe.Name)"

      - name: Create ClickOnce application manifest (dotnet mage)
        shell: pwsh
        run: |
          $out = Join-Path $env:GITHUB_WORKSPACE "${{ env.CLICKONCE_OUTDIR }}"
          $appOut = Join-Path $out $env:CLICKONCE_APP_SUBDIR
          $exe = $env:CLICKONCE_EXE_NAME
          $appManifest = Join-Path $appOut "$exe.manifest"
          $iconFile = Join-Path $appOut "guac.ico"
          if (-not (Test-Path $iconFile)) { throw "ClickOnce icon file not found: $iconFile" }

          dotnet mage -AddLauncher "$exe" -TargetDirectory "$appOut"
          if ($LASTEXITCODE -ne 0) { throw "Failed to add ClickOnce launcher to: $appOut" }

          dotnet mage -New Application `
            -Name "$env:CLICKONCE_MANIFEST_NAME" `
            -Version "${{ env.VERSION }}" `
            -FromDirectory "$appOut" `
            -ToFile "$appManifest" `
            -IconFile "guac.ico" `
            -Processor msil

          if ($LASTEXITCODE -eq 0) 
          { 
            Write-Host "Application manifest creation process ran successfully: $appManifest" 
          }
          else {
            Write-Host "Directory listing:"
            Get-ChildItem -Path $appOut -Force | Sort-Object Name | Format-Table Name,Length | Out-String | Write-Host
            throw "Application manifest creation process failed: $appManifest not created successfully"
          }
          if (-not (Test-Path $appManifest)) { throw "Application manifest not created: $appManifest" }          

          "CLICKONCE_APP_MANIFEST=$($env:CLICKONCE_APP_SUBDIR)\$exe.manifest" | Out-File -Append $env:GITHUB_ENV -Encoding utf8

      - name: Create ClickOnce deployment manifest (dotnet mage)
        shell: pwsh
        run: |
          $out = Join-Path $env:GITHUB_WORKSPACE "${{ env.CLICKONCE_OUTDIR }}"
          $appManifest = Join-Path $out $env:CLICKONCE_APP_MANIFEST
          $deployManifest = Join-Path $out "${{ env.CLICKONCE_APP_NAME }}.application"

          if (-not (Test-Path $appManifest)) { throw "App manifest not found: $appManifest" }

          Push-Location $out
          dotnet mage -New Deployment `
            -Name "$env:CLICKONCE_MANIFEST_NAME" `
            -Version "${{ env.VERSION }}" `
            -AppManifest "$env:CLICKONCE_APP_MANIFEST" `
            -ToFile "$deployManifest" `
            -ProviderURL "${{ env.CLICKONCE_PROVIDER_URL }}" `
            -Install true
          Pop-Location
          if ($LASTEXITCODE -ne 0) { throw "Deployment manifest creation failed: $deployManifest" }

          if (-not (Test-Path $deployManifest)) { throw "Deployment manifest not created: $deployManifest" }

      - name: Set explicit ClickOnce update policy
        shell: pwsh
        run: |
          $out = Join-Path $env:GITHUB_WORKSPACE "${{ env.CLICKONCE_OUTDIR }}"
          $deployManifest = Join-Path $out "${{ env.CLICKONCE_APP_NAME }}.application"

          if (-not (Test-Path $deployManifest)) { throw "Deployment manifest not found: $deployManifest" }

          [xml]$deploymentXml = Get-Content -LiteralPath $deployManifest
          $deploymentNode = $deploymentXml.SelectSingleNode("//*[local-name()='deployment']")
          if ($deploymentNode -isnot [System.Xml.XmlElement]) {
            throw "Unable to locate <deployment> in $deployManifest"
          }

          $deploymentElement = [System.Xml.XmlElement]$deploymentNode
          $manifestNamespace = $deploymentElement.NamespaceURI

          $subscriptionNode = $deploymentElement.SelectSingleNode("*[local-name()='subscription']")
          if ($subscriptionNode -isnot [System.Xml.XmlElement]) {
            $subscriptionNode = $deploymentXml.CreateElement("subscription", $manifestNamespace)
            [void]$deploymentElement.PrependChild($subscriptionNode)
          }

          $subscriptionElement = [System.Xml.XmlElement]$subscriptionNode
          $updateNode = $subscriptionElement.SelectSingleNode("*[local-name()='update']")
          if ($updateNode -isnot [System.Xml.XmlElement]) {
            $updateNode = $deploymentXml.CreateElement("update", $manifestNamespace)
            [void]$subscriptionElement.AppendChild($updateNode)
          }

          $updateElement = [System.Xml.XmlElement]$updateNode

          foreach ($child in @($updateElement.ChildNodes)) {
            if ($child -is [System.Xml.XmlElement] -and $child.LocalName -eq "expiration") {
              [void]$updateElement.RemoveChild($child)
            }
          }

          $beforeStartupNode = $updateElement.SelectSingleNode("*[local-name()='beforeApplicationStartup']")
          if ($beforeStartupNode -isnot [System.Xml.XmlElement]) {
            $beforeStartupNode = $deploymentXml.CreateElement("beforeApplicationStartup", $manifestNamespace)
            [void]$updateElement.AppendChild($beforeStartupNode)
          }

          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText($deployManifest, $deploymentXml.OuterXml, $utf8NoBom)
          Write-Host "Configured ClickOnce update policy: beforeApplicationStartup"

      - name: Sign ClickOnce manifests (dotnet mage)
        shell: pwsh
        env:
          CLICKONCE_SIGNING_PFX_BASE64: ${{ secrets.CLICKONCE_SIGNING_PFX_BASE64 }}
          CLICKONCE_SIGNING_PFX_PASSWORD: ${{ secrets.CLICKONCE_SIGNING_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CLICKONCE_SIGNING_PFX_BASE64)) { throw "Missing secret: CLICKONCE_SIGNING_PFX_BASE64" }
          if ([string]::IsNullOrWhiteSpace($env:CLICKONCE_SIGNING_PFX_PASSWORD)) { throw "Missing secret: CLICKONCE_SIGNING_PFX_PASSWORD" }

          $out = Join-Path $env:GITHUB_WORKSPACE "${{ env.CLICKONCE_OUTDIR }}"
          $appManifest = Join-Path $out $env:CLICKONCE_APP_MANIFEST
          $deployManifest = Join-Path $out "${{ env.CLICKONCE_APP_NAME }}.application"

          if (-not (Test-Path $appManifest)) { throw "App manifest not found: $appManifest" }
          if (-not (Test-Path $deployManifest)) { throw "Deployment manifest not found: $deployManifest" }

          $pfxPath = Join-Path $env:RUNNER_TEMP "clickonce-signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CLICKONCE_SIGNING_PFX_BASE64))

          try {
            $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new(
              $pfxPath,
              $env:CLICKONCE_SIGNING_PFX_PASSWORD,
              [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::EphemeralKeySet
            )
            Write-Host "Loaded ClickOnce signing certificate: $($cert.Subject)"
            Write-Host "Certificate thumbprint: $($cert.Thumbprint)"
            Write-Host "Certificate expires: $($cert.NotAfter.ToString('u'))"
          }
          catch {
            throw "Failed to load CLICKONCE_SIGNING_PFX_BASE64 with CLICKONCE_SIGNING_PFX_PASSWORD. Verify that the PFX secret is valid and the password matches the exported certificate. $($_.Exception.Message)"
          }

          # Update + sign application manifest
          dotnet mage -Update "$appManifest" -CertFile "$pfxPath" -Password "$env:CLICKONCE_SIGNING_PFX_PASSWORD"
          if ($LASTEXITCODE -ne 0) { throw "Failed to sign application manifest: $appManifest" }

          # Update deployment manifest with appmanifest + sign deployment manifest
          Push-Location $out
          dotnet mage -Update "$deployManifest" -AppManifest "$env:CLICKONCE_APP_MANIFEST" -CertFile "$pfxPath" -Password "$env:CLICKONCE_SIGNING_PFX_PASSWORD"
          Pop-Location
          if ($LASTEXITCODE -ne 0) { throw "Failed to sign deployment manifest: $deployManifest" }

      - name: Create Dev ClickOnce output for release
        if: ${{ steps.pages.outputs.publish_both_channels == 'true' }}
        shell: pwsh
        env:
          CLICKONCE_SIGNING_PFX_BASE64: ${{ secrets.CLICKONCE_SIGNING_PFX_BASE64 }}
          CLICKONCE_SIGNING_PFX_PASSWORD: ${{ secrets.CLICKONCE_SIGNING_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CLICKONCE_SIGNING_PFX_BASE64)) { throw "Missing secret: CLICKONCE_SIGNING_PFX_BASE64" }
          if ([string]::IsNullOrWhiteSpace($env:CLICKONCE_SIGNING_PFX_PASSWORD)) { throw "Missing secret: CLICKONCE_SIGNING_PFX_PASSWORD" }

          $stableOut = Join-Path $env:GITHUB_WORKSPACE "${{ env.CLICKONCE_OUTDIR }}"
          $devOut = Join-Path $env:GITHUB_WORKSPACE "${{ env.CLICKONCE_DEV_OUTDIR }}"
          if (Test-Path $devOut) { Remove-Item -Recurse -Force $devOut }
          New-Item -ItemType Directory -Force -Path $devOut | Out-Null
          Copy-Item -Path (Join-Path $stableOut "*") -Destination $devOut -Recurse -Force

          $appOut = Join-Path $devOut $env:CLICKONCE_APP_SUBDIR
          $exe = $env:CLICKONCE_EXE_NAME
          $appManifest = Join-Path $appOut "$exe.manifest"
          $devAppManifestRelativePath = "$($env:CLICKONCE_APP_SUBDIR)\$exe.manifest"
          $deployManifest = Join-Path $devOut "${{ env.CLICKONCE_APP_NAME }}.application"
          $iconFile = Join-Path $appOut "guac.ico"
          $providerUrl = "https://jochenwezel.github.io/GuacamoleClient/clickonce/dev/${{ env.CLICKONCE_APP_NAME }}.application"
          $pfxPath = Join-Path $env:RUNNER_TEMP "clickonce-signing.pfx"

          if (-not (Test-Path $iconFile)) { throw "ClickOnce icon file not found: $iconFile" }
          if (-not (Test-Path $pfxPath)) {
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CLICKONCE_SIGNING_PFX_BASE64))
          }

          $appInfo = [ordered]@{
            schemaVersion = 1
            appId = "winforms"
            deploymentType = "clickonce"
            channel = "dev"
            version = $env:VERSION
            updatesUrl = "https://jochenwezel.github.io/GuacamoleClient/app-updates.json"
          }
          $appInfo | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath (Join-Path $appOut "app-info.json") -Encoding utf8

          Remove-Item -LiteralPath $appManifest -Force
          Remove-Item -LiteralPath $deployManifest -Force

          dotnet mage -New Application `
            -Name "GuacamoleClient Dev" `
            -Version "${{ env.VERSION }}" `
            -FromDirectory "$appOut" `
            -ToFile "$appManifest" `
            -IconFile "guac.ico" `
            -Processor msil
          if ($LASTEXITCODE -ne 0) { throw "Dev application manifest creation failed: $appManifest" }

          Push-Location $devOut
          dotnet mage -New Deployment `
            -Name "GuacamoleClient Dev" `
            -Version "${{ env.VERSION }}" `
            -AppManifest "$devAppManifestRelativePath" `
            -ToFile "$deployManifest" `
            -ProviderURL "$providerUrl" `
            -Install true
          Pop-Location
          if ($LASTEXITCODE -ne 0) { throw "Dev deployment manifest creation failed: $deployManifest" }

          [xml]$deploymentXml = Get-Content -LiteralPath $deployManifest
          $deploymentNode = $deploymentXml.SelectSingleNode("//*[local-name()='deployment']")
          if ($deploymentNode -isnot [System.Xml.XmlElement]) {
            throw "Unable to locate <deployment> in $deployManifest"
          }

          $deploymentElement = [System.Xml.XmlElement]$deploymentNode
          $manifestNamespace = $deploymentElement.NamespaceURI
          $subscriptionNode = $deploymentElement.SelectSingleNode("*[local-name()='subscription']")
          if ($subscriptionNode -isnot [System.Xml.XmlElement]) {
            $subscriptionNode = $deploymentXml.CreateElement("subscription", $manifestNamespace)
            [void]$deploymentElement.PrependChild($subscriptionNode)
          }

          $subscriptionElement = [System.Xml.XmlElement]$subscriptionNode
          $updateNode = $subscriptionElement.SelectSingleNode("*[local-name()='update']")
          if ($updateNode -isnot [System.Xml.XmlElement]) {
            $updateNode = $deploymentXml.CreateElement("update", $manifestNamespace)
            [void]$subscriptionElement.AppendChild($updateNode)
          }

          $updateElement = [System.Xml.XmlElement]$updateNode
          foreach ($child in @($updateElement.ChildNodes)) {
            if ($child -is [System.Xml.XmlElement] -and $child.LocalName -eq "expiration") {
              [void]$updateElement.RemoveChild($child)
            }
          }

          $beforeStartupNode = $updateElement.SelectSingleNode("*[local-name()='beforeApplicationStartup']")
          if ($beforeStartupNode -isnot [System.Xml.XmlElement]) {
            $beforeStartupNode = $deploymentXml.CreateElement("beforeApplicationStartup", $manifestNamespace)
            [void]$updateElement.AppendChild($beforeStartupNode)
          }

          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText($deployManifest, $deploymentXml.OuterXml, $utf8NoBom)

          dotnet mage -Update "$appManifest" -CertFile "$pfxPath" -Password "$env:CLICKONCE_SIGNING_PFX_PASSWORD"
          if ($LASTEXITCODE -ne 0) { throw "Failed to sign dev application manifest: $appManifest" }

          Push-Location $devOut
          dotnet mage -Update "$deployManifest" -AppManifest "$devAppManifestRelativePath" -CertFile "$pfxPath" -Password "$env:CLICKONCE_SIGNING_PFX_PASSWORD"
          Pop-Location
          if ($LASTEXITCODE -ne 0) { throw "Failed to sign dev deployment manifest: $deployManifest" }

      - name: Pack ClickOnce output (ZIP)
        shell: pwsh
        run: |
          $src = Join-Path $env:GITHUB_WORKSPACE "${{ env.CLICKONCE_OUTDIR }}\*"
          $dst = Join-Path $env:GITHUB_WORKSPACE "bin-winforms-clickonce-${{ env.VERSION }}.zip"
          Compress-Archive -Path $src -DestinationPath $dst -Force

      - name: Upload artifact (ClickOnce ZIP)
        uses: actions/upload-artifact@v7
        with:
          name: GuacamoleClient-WinForms_clickonce_${{ env.VERSION }}_anycpu
          path: bin-winforms-clickonce-${{ env.VERSION }}.zip
          if-no-files-found: error
          retention-days: 14

      ## 6) Attach ClickOnce ZIP to GitHub release
      #- name: Publish ClickOnce ZIP to the release
      #  uses: softprops/action-gh-release@v2
      #  with:
      #    files: bin-winforms-clickonce-${{ env.VERSION }}.zip
      #    tag_name: ${{ github.event.release.tag_name || github.ref_name }}
      #  env:
      #    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (ClickOnce folder for Pages)
        uses: actions/upload-artifact@v7
        with:
          name: clickonce-folder
          path: ${{ env.CLICKONCE_OUTDIR }}/**
          if-no-files-found: error
          retention-days: 1

      - name: Upload artifact (Dev ClickOnce folder for Pages)
        if: ${{ steps.pages.outputs.publish_both_channels == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: clickonce-folder-dev
          path: ${{ env.CLICKONCE_DEV_OUTDIR }}/**
          if-no-files-found: error
          retention-days: 1
